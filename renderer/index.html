<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com"
    />
    <title>RTL Fixer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-content">
        <h1>RTL Fixer</h1>
        <p>اصلاح خودکار متن‌های دوجهته فارسی-انگلیسی</p>
      </div>
      <div class="header-actions">
        <div id="theme-switcher" class="theme-switcher">
          <button data-theme="system" class="theme-btn active" title="تنظیمات سیستم">🖥</button>
          <button data-theme="light" class="theme-btn" title="روشن">☀</button>
          <button data-theme="dark" class="theme-btn" title="تاریک">🌙</button>
        </div>
        <button id="settings-btn" class="btn btn-ghost" title="تنظیمات">⚙</button>
        <button id="clear-btn" class="btn btn-ghost">پاک کردن</button>
      </div>
    </header>

    <main>
      <div class="panels">
        <div class="panel">
          <div class="panel-header">
            <span>متن ورودی</span>
            <div class="panel-header-actions">
              <div id="input-view-switcher" class="segmented-control seg-mini">
                <button data-val="txt" class="seg-btn active">TXT</button>
                <button data-val="md" class="seg-btn">MD</button>
                <button data-val="marked" class="seg-btn">marked</button>
              </div>
              <button id="paste-btn" class="btn btn-sm">📋 Paste</button>
            </div>
          </div>
          <textarea
            id="input"
            dir="ltr"
            placeholder="متن خود را اینجا وارد کنید یا Paste بزنید..."
            spellcheck="false"
          ></textarea>
          <div id="input-md-preview" class="md-preview" dir="auto" style="display:none"></div>
        </div>

        <div class="controls-center">
          <button id="fix-btn" class="btn btn-primary" title="اصلاح خطوط مشکل‌دار">
            <span class="fix-icon">⚡</span>
            <span>اصلاح</span>
          </button>
          <button id="strip-btn" class="btn btn-danger-outline" title="حذف همه نشانه‌ها">
            <span>✕</span>
            <span>حذف</span>
          </button>
          <button id="reveal-btn" class="btn btn-outline" title="نمایش کاراکترهای مخفی">
            <span>👁</span>
            <span>مخفی‌ها</span>
          </button>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span>متن اصلاح‌شده</span>
            <div class="panel-header-actions">
              <div id="output-view-switcher" class="segmented-control seg-mini">
                <button data-val="txt" class="seg-btn active">TXT</button>
                <button data-val="md" class="seg-btn">MD</button>
                <button data-val="marked" class="seg-btn">marked</button>
              </div>
              <button id="copy-btn" class="btn btn-sm">📋 Copy</button>
            </div>
          </div>
          <textarea
            id="output"
            dir="ltr"
            readonly
            placeholder="متن اصلاح‌شده اینجا نمایش داده می‌شود..."
            spellcheck="false"
          ></textarea>
          <div id="md-preview" class="md-preview" dir="auto" style="display:none"></div>
        </div>
      </div>
    </main>

    <footer>
      <div id="status">آماده</div>
      <div class="stats">
        <span id="line-count">۰ خط</span>
        <span class="sep">|</span>
        <span id="fix-count">۰ اصلاح</span>
      </div>
    </footer>

    <div id="toast" class="toast"></div>

    <div id="settings-bar" class="settings-bar" style="display:none">
      <div class="settings-group">
        <div class="settings-group-title">اصلاح متن (هاردکد)</div>
        <div class="setting-row" title="نحوه اضافه کردن کاراکتر جهت به ابتدای خطوط.&#10;خودکار: بر اساس محتوای هر خط.&#10;همه RTL/LTR: همه خطوط یکسان.">
          <span class="setting-title">حالت اصلاح</span>
          <div id="fix-mode-switcher" class="segmented-control">
            <button data-val="auto" class="seg-btn active">خودکار</button>
            <button data-val="rtl" class="seg-btn">همه RTL</button>
            <button data-val="ltr" class="seg-btn">همه LTR</button>
          </div>
        </div>
        <div class="setting-row" title="جهت سرتیتر لیست‌های شماره‌دار (1. 2.) و بولتی (- *).&#10;خودکار: بر اساس محتوای خط.&#10;راست‌چین/چپ‌چین: اجبار جهت خاص.">
          <span class="setting-title">جهت سرتیتر لیست</span>
          <div id="list-dir-switcher" class="segmented-control">
            <button data-val="auto" class="seg-btn active">خودکار</button>
            <button data-val="rtl" class="seg-btn">راست‌چین</button>
            <button data-val="ltr" class="seg-btn">چپ‌چین</button>
          </div>
        </div>
        <div class="setting-row" title="وقتی خط با کاراکتر خنثی شروع شود (عدد، پرانتز، براکت...):&#10;اگر بقیه خط انگلیسی → LRM&#10;اگر فارسی یا مخلوط → RLM">
          <span class="setting-title">اصلاح شروع خنثی</span>
          <div id="neutral-fix-switcher" class="segmented-control">
            <button data-val="on" class="seg-btn">روشن</button>
            <button data-val="off" class="seg-btn">خاموش</button>
          </div>
        </div>
      </div>
      <div class="settings-group">
        <div class="settings-group-title">تنظیمات marked</div>
        <div class="setting-row" title="حذف نشانه‌های قابل مشاهده (ر و L) از ابتدای خطوط قبل از پردازش marked.&#10;(نمایشی — فقط روی پیش‌نمایش marked تأثیر دارد)">
          <span class="setting-title">حذف نشانه‌ها <small>(نمایشی)</small></span>
          <div id="md-strip-marks-switcher" class="segmented-control">
            <button data-val="on" class="seg-btn">روشن</button>
            <button data-val="off" class="seg-btn">خاموش</button>
          </div>
        </div>
        <div class="setting-row" title="جابجایی کاراکتر جهت از قبل سینتکس مارک‌دان (1. # > -) به بعدش.&#10;تا موتور marked بتواند لیست/هدر/بلاک‌کوت را بشناسد.&#10;(هاردکد — جای کاراکتر در متن کپی‌شده تغییر می‌کند)">
          <span class="setting-title">آماده‌سازی <small>(هاردکد)</small></span>
          <div id="md-prepare-switcher" class="segmented-control">
            <button data-val="on" class="seg-btn">روشن</button>
            <button data-val="off" class="seg-btn">خاموش</button>
          </div>
        </div>
        <div class="setting-row" title="اضافه کردن dir=auto روی هر بلاک مارک‌دان.&#10;تا مرورگر جهت هر بلاک را از محتوایش تشخیص دهد.&#10;(نمایشی — فقط روی پیش‌نمایش marked تأثیر دارد)">
          <span class="setting-title">جهت خودکار <small>(نمایشی)</small></span>
          <div id="md-autodir-switcher" class="segmented-control">
            <button data-val="on" class="seg-btn">روشن</button>
            <button data-val="off" class="seg-btn">خاموش</button>
          </div>
        </div>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
