<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com"
    />
    <title>RTL Fixer</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-content">
        <h1>RTL Fixer</h1>
        <p>اصلاح خودکار متن‌های دوجهته فارسی-انگلیسی</p>
      </div>
      <div class="header-actions">
        <div id="theme-switcher" class="theme-switcher">
          <button data-theme="system" class="theme-btn active" title="تنظیمات سیستم">🖥</button>
          <button data-theme="light" class="theme-btn" title="روشن">☀</button>
          <button data-theme="dark" class="theme-btn" title="تاریک">🌙</button>
        </div>
        <button id="settings-btn" class="btn btn-ghost" title="تنظیمات">⚙</button>
        <button id="clear-btn" class="btn btn-ghost">پاک کردن</button>
      </div>
    </header>

    <main>
      <div class="panels">
        <div class="panel">
          <div class="panel-header">
            <span>متن ورودی</span>
            <div class="panel-header-actions">
              <button id="input-preview-btn" class="btn btn-sm" title="پیش‌نمایش Markdown">MD</button>
              <button id="paste-btn" class="btn btn-sm">📋 Paste</button>
            </div>
          </div>
          <textarea
            id="input"
            dir="ltr"
            placeholder="متن خود را اینجا وارد کنید یا Paste بزنید..."
            spellcheck="false"
          ></textarea>
          <div id="input-md-preview" class="md-preview" dir="ltr" style="display:none"></div>
        </div>

        <div class="controls-center">
          <button id="fix-btn" class="btn btn-primary" title="اصلاح خطوط مشکل‌دار">
            <span class="fix-icon">⚡</span>
            <span>اصلاح</span>
          </button>
          <button id="strip-btn" class="btn btn-danger-outline" title="حذف همه نشانه‌ها">
            <span>✕</span>
            <span>حذف</span>
          </button>
          <button id="reveal-btn" class="btn btn-outline" title="نمایش کاراکترهای مخفی">
            <span>👁</span>
            <span>مخفی‌ها</span>
          </button>
        </div>

        <div class="panel">
          <div class="panel-header">
            <span>متن اصلاح‌شده</span>
            <div class="panel-header-actions">
              <button id="preview-btn" class="btn btn-sm" title="پیش‌نمایش Markdown">MD</button>
              <button id="copy-btn" class="btn btn-sm">📋 Copy</button>
            </div>
          </div>
          <textarea
            id="output"
            dir="ltr"
            readonly
            placeholder="متن اصلاح‌شده اینجا نمایش داده می‌شود..."
            spellcheck="false"
          ></textarea>
          <div id="md-preview" class="md-preview" dir="ltr" style="display:none"></div>
        </div>
      </div>
    </main>

    <footer>
      <div id="status">آماده</div>
      <div class="stats">
        <span id="line-count">۰ خط</span>
        <span class="sep">|</span>
        <span id="fix-count">۰ اصلاح</span>
      </div>
    </footer>

    <div id="toast" class="toast"></div>

    <div id="settings-bar" class="settings-bar" style="display:none">
      <div class="setting-row">
        <span class="setting-title">حالت اصلاح</span>
        <div id="fix-mode-switcher" class="segmented-control">
          <button data-val="auto" class="seg-btn active">خودکار</button>
          <button data-val="rtl" class="seg-btn">همه RTL</button>
          <button data-val="ltr" class="seg-btn">همه LTR</button>
        </div>
      </div>
      <div class="setting-sep"></div>
      <div class="setting-row">
        <span class="setting-title">جهت سرتیتر لیست</span>
        <div id="list-dir-switcher" class="segmented-control">
          <button data-val="auto" class="seg-btn active">خودکار</button>
          <button data-val="rtl" class="seg-btn">راست‌چین</button>
          <button data-val="ltr" class="seg-btn">چپ‌چین</button>
        </div>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
